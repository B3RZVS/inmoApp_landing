              "query-input": "required name=search_term_string"
            }

              "geographicArea": { "@type": "Country", "name": "Argentina" }

            "featureList": [
              "Aumentos automáticos ICL e IPC",

              "Avisos de vencimientos de contratos",
              "Mapa interactivo de inmuebles",
              "Caja integrada",
              "Catálogo de propiedades en venta",
              "Gestión de contratos y clientes"
            ]
          },
          {
            "@type": "FAQPage",
            "@id": "https://inmoapp.ar/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "¿Vale la pena si todavía tengo pocos contratos?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Empezar organizado es más fácil que ordenar el caos después. Con tu primer contrato ya tiene sentido. Los corredores que arrancan bien escalan más rápido."
                }
              },
              {
                "@type": "Question",
                "name": "¿Es un gasto más cuando recién arranco?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Un solo error en un aumento mal calculado o un contrato vencido sin renovar te cuesta más que la suscripción anual. inmoApp se paga solo."
                }
              },
              {
                "@type": "Question",
                "name": "¿Es difícil de usar?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Fue diseñado para el corredor que empieza, no para técnicos. Si sabés usar WhatsApp, podés usar inmoApp. Además, el onboarding es acompañado."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué pasa con mis datos actuales en Excel?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Te ayudamos a migrar tu información. No empezás de cero — llevás todo lo que ya tenés y desde ahí inmoApp toma el control."
                }
              },
              {
                "@type": "Question",
                "name": "¿Calcula aumentos por ICL e IPC?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sí. El sistema aplica automáticamente el índice que corresponda según el contrato: ICL, IPC u otros que se definan por normativa."
                }
              },
              {
                "@type": "Question",
                "name": "¿Puedo cancelar cuando quiero?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sí, podés cancelar en cualquier momento sin cargos ni compromisos. No te atamos a contratos largos."
                }
              }
            ]
          }
